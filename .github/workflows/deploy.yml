name: deploy

on:
  push:
    branches:
      - main

jobs:
  check:
    uses: ./.github/workflows/check.yml

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug deploy key fingerprint
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-keygen -lf ~/.ssh/deploy_key.pub

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 443
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git pull --ff-only
            docker compose --env-file .env.compose.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose --env-file .env.compose.production -f docker-compose.prod.yml exec -T api uv run --no-sync alembic upgrade head
            docker compose --env-file .env.compose.production -f docker-compose.prod.yml ps
