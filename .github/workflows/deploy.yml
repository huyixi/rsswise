name: deploy

on:
  push:
    branches:
      - main

jobs:
  check:
    uses: ./.github/workflows/check.yml

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keygen -y -f ~/.ssh/github_deploy > ~/.ssh/github_deploy.pub
          ssh-keygen -lf ~/.ssh/github_deploy.pub

      - name: Test SSH connection
        run: |
          ssh -vvv \
            -p "${{ vars.DEPLOY_PORT }}" \
            -i ~/.ssh/github_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "whoami && hostname"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT }}
          key_path: /home/runner/.ssh/github_deploy
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -p rsswise --env-file .env.compose.production -f docker-compose.prod.yml down --remove-orphans
            docker compose -p rsswise --env-file .env.compose.production -f docker-compose.prod.yml up -d --build
            docker compose --env-file .env.compose.production -f docker-compose.prod.yml exec -T api uv run --no-sync alembic upgrade head
            docker compose --env-file .env.compose.production -f docker-compose.prod.yml ps
